<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenTabs</title>
  <meta name="description" content="OpenTabs — live design-job board: New, Not Applied, Applied.">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- ── Top navigation (brand · section tabs · status) ────────────── -->
  <header class="nav">
    <a class="cell brand" href="#top">
      <svg class="logo" viewBox="0 0 256 256" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M232,216H208V40a16,16,0,0,0-16-16H64A16,16,0,0,0,48,40V216H24a8,8,0,0,0,0,16H232a8,8,0,0,0,0-16Zm-64,0H64V40H168Zm-40-84a12,12,0,1,1,12,12A12,12,0,0,1,128,132Z"></path></svg>
      <span>OpenTabs</span>
    </a>
    <a class="cell tab" href="./raised.html"><span class="t">Just Raised <em data-count="raised">0</em></span></a>
    <a class="cell tab" data-jump="new"><span class="t">New <em data-count="new">0</em></span></a>
    <a class="cell tab" data-jump="notapplied"><span class="t">Not Applied <em data-count="notapplied">0</em></span></a>
    <a class="cell tab" data-jump="app"><span class="t">Applied <em data-count="app">0</em></span></a>
    <a class="cell tab" id="trashNav"><span class="t">Trash <em data-count="trash">0</em></span></a>
    <div class="cell status" id="status">Loading…</div>
    <button class="cell menu" id="menuBtn" aria-label="Toggle filters">Filters</button>
  </header>

  <!-- ── Filter / control bars ─────────────────────────────────────── -->
  <section class="controls" id="controls">
    <div class="row">
      <label class="field search">
        <input id="q" type="search" placeholder="Search title or company" autocomplete="off">
      </label>
      <label class="field">
        <span class="lbl">Source</span>
        <select id="fSource"><option value="">All sources</option></select>
      </label>
      <label class="field">
        <span class="lbl">Location</span>
        <select id="fLoc">
          <option value="">All locations</option>
          <option value="sfbay">San Francisco &amp; Bay Area</option>
          <option value="ny">New York</option>
          <option value="us">Rest of USA</option>
          <option value="remote">Remote</option>
        </select>
      </label>
      <label class="field">
        <span class="lbl">Date</span>
        <select id="fDate">
          <option value="">Any time</option>
          <option value="3">Last 3 hours</option>
          <option value="8">Last 8 hours</option>
          <option value="16">Last 16 hours</option>
          <option value="24">Last 24 hours</option>
          <option value="72">Last 3 days</option>
          <option value="168">Last week</option>
          <option value="720">Last 30 days</option>
        </select>
      </label>
      <label class="field">
        <span class="lbl">Visa</span>
        <select id="fVisa">
          <option value="">All</option>
          <option value="yes">Sponsors visa</option>
          <option value="no">No sponsorship</option>
          <option value="unknown">Unknown</option>
        </select>
      </label>
      <label class="field size">
        <span class="lbl"><span id="sizeVal">24</span>px</span>
        <input id="size" type="range" min="14" max="44" value="24">
      </label>
    </div>

    <div class="row sub">
      <div class="left">
        <span class="count" id="count">0</span> results
        <span class="seg seg-view">
          <button class="view is-on" data-view="board" title="Column view" aria-label="Column view"><svg viewBox="0 0 256 256" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M120,48V208a16,16,0,0,1-16,16H64a16,16,0,0,1-16-16V48A16,16,0,0,1,64,32h40A16,16,0,0,1,120,48Zm72-16H152a16,16,0,0,0-16,16V208a16,16,0,0,0,16,16h40a16,16,0,0,0,16-16V48A16,16,0,0,0,192,32Z"></path></svg></button>
          <button class="view" data-view="list" title="List view" aria-label="List view"><svg viewBox="0 0 256 256" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M224,152v40a16,16,0,0,1-16,16H48a16,16,0,0,1-16-16V152a16,16,0,0,1,16-16H208A16,16,0,0,1,224,152ZM208,48H48A16,16,0,0,0,32,64v40a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V64A16,16,0,0,0,208,48Z"></path></svg></button>
        </span>
      </div>
      <div class="right">
        <span class="sortlbl">Sort by</span>
        <span class="seg seg-sort">
          <button class="sort" data-sort="new"><svg viewBox="0 0 256 256" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M235.24,84.38l-28.06,23.68,8.56,35.39a13.34,13.34,0,0,1-5.09,13.91,13.54,13.54,0,0,1-15,.69L164,139l-31.65,19.06a13.51,13.51,0,0,1-15-.69,13.32,13.32,0,0,1-5.1-13.91l8.56-35.39L92.76,84.38a13.39,13.39,0,0,1,7.66-23.58l36.94-2.92,14.21-33.66a13.51,13.51,0,0,1,24.86,0l14.21,33.66,36.94,2.92a13.39,13.39,0,0,1,7.66,23.58ZM88.11,111.89a8,8,0,0,0-11.32,0L18.34,170.34a8,8,0,0,0,11.32,11.32l58.45-58.45A8,8,0,0,0,88.11,111.89Zm-.5,61.19L34.34,226.34a8,8,0,0,0,11.32,11.32l53.26-53.27a8,8,0,0,0-11.31-11.31Zm73-1-54.29,54.28a8,8,0,0,0,11.32,11.32l54.28-54.28a8,8,0,0,0-11.31-11.32Z"></path></svg>Newest</button>
          <button class="sort is-on" data-sort="location"><svg viewBox="0 0 256 256" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M200,224H150.54A266.56,266.56,0,0,0,174,200.25c27.45-31.57,42-64.85,42-96.25a88,88,0,0,0-176,0c0,31.4,14.51,64.68,42,96.25A266.56,266.56,0,0,0,105.46,224H56a8,8,0,0,0,0,16H200a8,8,0,0,0,0-16ZM128,72a32,32,0,1,1-32,32A32,32,0,0,1,128,72Z"></path></svg>Location</button>
          <button class="sort" data-sort="salary"><svg viewBox="0 0 256 256" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M226,88.08c-.4-1-.82-2-1.25-3a87.93,87.93,0,0,0-30.17-37H216a8,8,0,0,0,0-16H112a88.12,88.12,0,0,0-87.72,81A32,32,0,0,0,0,144a8,8,0,0,0,16,0,16,16,0,0,1,8.57-14.16A87.69,87.69,0,0,0,46,178.22l12.56,35.16A16,16,0,0,0,73.64,224H86.36a16,16,0,0,0,15.07-10.62l1.92-5.38h57.3l1.92,5.38A16,16,0,0,0,177.64,224h12.72a16,16,0,0,0,15.07-10.62L221.64,168H224a24,24,0,0,0,24-24V112A24,24,0,0,0,226,88.08ZM152,72H112a8,8,0,0,1,0-16h40a8,8,0,0,1,0,16Zm28,56a12,12,0,1,1,12-12A12,12,0,0,1,180,128Z"></path></svg>Salary</button>
        </span>
        <span class="swatches" id="swatches" aria-label="Colour theme">
          <button class="sw" data-theme="dark"  style="--c:#0c0d0f" title="Dark"></button>
          <button class="sw" data-theme="paper" style="--c:#ffffff" title="Paper"></button>
          <button class="sw" data-theme="blush" style="--c:#f4dcda" title="Blush"></button>
          <button class="sw" data-theme="mint"  style="--c:#d9f0db" title="Mint"></button>
          <button class="sw" data-theme="cream" style="--c:#f1efbe" title="Cream"></button>
        </span>
        <button class="undo-all" id="undoBtn" title="Undo last action" aria-label="Undo last action" disabled><svg viewBox="0 0 256 256" width="17" height="17" fill="currentColor" aria-hidden="true"><path d="M232,112a64.07,64.07,0,0,1-64,64H88v40a8,8,0,0,1-13.66,5.66l-48-48a8,8,0,0,1,0-11.32l48-48A8,8,0,0,1,88,120v40h80a48,48,0,0,0,0-96H80a8,8,0,0,1,0-16h88A64.07,64.07,0,0,1,232,112Z"></path></svg></button>
      </div>
    </div>
  </section>

  <!-- ── Three-column board: New · Not Applied · Applied ───────────── -->
  <main id="top" class="board">
    <section class="col" id="sec-new">
      <div class="col-head"><h2>New</h2><em data-count="new">0</em><span class="hint">last 24h</span><button class="clear-all" data-clear="new">Clear all</button></div>
      <div class="rows" id="rows-new"></div>
    </section>
    <section class="col" id="sec-notapplied">
      <div class="col-head"><h2>Not Applied</h2><em data-count="notapplied">0</em><span class="hint">older than 24h</span><button class="clear-all" data-clear="notapplied">Clear all</button></div>
      <div class="rows" id="rows-notapplied"></div>
    </section>
    <section class="col" id="sec-app">
      <div class="col-head"><h2>Applied</h2><em data-count="app">0</em><button class="clear-all" data-clear="app">Clear all</button></div>
      <div class="rows" id="rows-app"></div>
    </section>
  </main>

  <!-- ── Trash: collapsible drawer of deleted jobs (restorable) ────── -->
  <div class="drawer-tabs">
    <button class="drawer-tab" id="tabTrash" aria-label="Open Trash"><span>Trash</span><em data-count="trash">0</em></button>
  </div>
  <div class="drawer-scrim" id="drawerScrim"></div>
  <aside class="drawer drawer-trash" id="drawerTrash" aria-label="Deleted jobs">
    <div class="drawer-head">
      <h2>Trash <em data-count="trash">0</em></h2>
      <button class="drawer-close" data-close aria-label="Close">✕</button>
    </div>
    <div class="rows" id="rows-trash"></div>
  </aside>

  <footer class="foot">
    <span class="stats"><b id="statOpen">0</b> tabs open · <b id="statDone">0</b> done</span>
    <span class="tagline">Close the tabs. Get the offer.</span>
  </footer>

  <a href="#top" class="totop" aria-label="Back to top">Top</a>

  <!-- ── Confirm modal (Clear all) ─────────────────────────────────── -->
  <div class="modal-scrim" id="modalScrim" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalMsg">
      <p class="modal-msg" id="modalMsg"></p>
      <div class="modal-actions">
        <button class="modal-btn no" id="modalNo">No</button>
        <button class="modal-btn yes" id="modalYes">Yes, move to Trash</button>
      </div>
    </div>
  </div>

  <!-- ── "Did you apply?" popup (shown on every tile click) ────────── -->
  <div class="modal-scrim" id="applyScrim" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="applyMsg">
      <p class="modal-msg" id="applyMsg"></p>
      <div class="modal-actions">
        <button class="modal-btn no" id="applyNo">No, not yet</button>
        <button class="modal-btn yes" id="applyYes">Yes, applied</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
